name: StageInstallTools
description: "Install common tooling (Node.js, Java, Helm, kubectl)"
inputs:
  node-version:
    description: Version range for Node.js
    required: false
    default: '20.x'
  java-version:
    description: Version for Java (Temurin)
    required: false
    default: '17'
  helm-version:
    description: Helm version to install
    required: false
    default: '3.9.3'
  kubectl-version:
    description: Kubectl version to install (or 'latest')
    required: false
    default: 'latest'
runs:
  using: composite
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs['node-version'] }}

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: ${{ inputs['java-version'] }}

    - name: Setup Helm
      uses: azure/setup-helm@v4
      with:
        version: ${{ inputs['helm-version'] }}

    - name: Setup kubectl
      uses: azure/setup-kubectl@v4
      with:
        version: ${{ inputs['kubectl-version'] }}

