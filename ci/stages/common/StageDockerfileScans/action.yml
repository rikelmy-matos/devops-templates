name: StageDockerfileScans
description: "Scan a container image with Trivy and Grype, upload SARIF"
inputs:
  registry:
    description: Container registry hostname (e.g. ghcr.io or myregistry.azurecr.io)
    required: false
    default: ''
  username:
    description: Registry username if login required
    required: false
    default: ''
  password:
    description: Registry password/token if login required
    required: false
    default: ''
  image:
    description: Full image name without tag (e.g. myorg/app)
    required: true
  tag:
    description: Image tag
    required: false
    default: 'latest'
runs:
  using: composite
  steps:
    - name: Optional login to registry
      if: ${{ inputs.registry != '' && inputs.username != '' && inputs.password != '' }}
      uses: docker/login-action@v3
      with:
        registry: ${{ inputs.registry }}
        username: ${{ inputs.username }}
        password: ${{ inputs.password }}

    - name: Trivy image scan (SARIF)
      uses: aquasecurity/trivy-action@0.35.0
      continue-on-error: true
      env:
        # Pass registry credentials so Trivy can pull from private registries
        # without relying on the Docker daemon's credential store
        TRIVY_USERNAME: ${{ inputs.username }}
        TRIVY_PASSWORD: ${{ inputs.password }}
      with:
        image-ref: ${{ inputs.registry != '' && format('{0}/', inputs.registry) || '' }}${{ inputs.image }}:${{ inputs.tag }}
        format: 'sarif'
        output: trivy-image.sarif
        vuln-type: 'os,library'
        ignore-unfixed: true

    - name: Upload Trivy SARIF to code scanning
      if: ${{ hashFiles('trivy-image.sarif') != '' }}
      uses: github/codeql-action/upload-sarif@v4
      with:
        sarif_file: trivy-image.sarif

    - name: Anchore Grype scan via action
      uses: anchore/scan-action@v3
      continue-on-error: true
      env:
        GRYPE_REGISTRY_AUTH_USERNAME: ${{ inputs.username }}
        GRYPE_REGISTRY_AUTH_PASSWORD: ${{ inputs.password }}
      with:
        image: ${{ inputs.registry != '' && format('{0}/', inputs.registry) || '' }}${{ inputs.image }}:${{ inputs.tag }}
        fail-build: false
        output-format: sarif
        only-fixed: false

    - name: Upload Grype SARIF to code scanning
      if: ${{ hashFiles('results.sarif') != '' }}
      uses: github/codeql-action/upload-sarif@v4
      with:
        sarif_file: results.sarif

