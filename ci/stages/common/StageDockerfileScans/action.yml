name: StageDockerfileScans
description: "Scan a container image with Trivy and Grype, upload SARIF"
inputs:
  registry:
    description: Container registry hostname (e.g. ghcr.io or myregistry.azurecr.io)
    required: false
    default: ''
  username:
    description: Registry username if login required
    required: false
    default: ''
  password:
    description: Registry password/token if login required
    required: false
    default: ''
  image:
    description: Full image name without tag (e.g. myorg/app)
    required: true
  tag:
    description: Image tag
    required: false
    default: 'latest'
runs:
  using: composite
  steps:
    - name: Log in to registry
      if: ${{ inputs.registry != '' && inputs.username != '' && inputs.password != '' }}
      uses: docker/login-action@v3
      with:
        registry: ${{ inputs.registry }}
        username: ${{ inputs.username }}
        password: ${{ inputs.password }}

    - name: Pull image locally
      shell: bash
      run: |
        IMAGE="${{ inputs.registry != '' && format('{0}/', inputs.registry) || '' }}${{ inputs.image }}:${{ inputs.tag }}"
        docker pull "$IMAGE"
        echo "IMAGE_REF=$IMAGE" >> "$GITHUB_ENV"

    - name: Trivy image scan (SARIF)
      uses: aquasecurity/trivy-action@0.35.0
      continue-on-error: true
      with:
        image-ref: ${{ env.IMAGE_REF }}
        format: 'sarif'
        output: trivy-image.sarif
        vuln-type: 'os,library'
        ignore-unfixed: true

    - name: Upload Trivy SARIF to code scanning
      if: ${{ hashFiles('trivy-image.sarif') != '' }}
      uses: github/codeql-action/upload-sarif@v4
      with:
        sarif_file: trivy-image.sarif

    - name: Grype image scan (SARIF)
      shell: bash
      continue-on-error: true
      run: |
        curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh -s -- -b /usr/local/bin
        grype "$IMAGE_REF" --output sarif --file grype-image.sarif || true
        # Validate the file is non-empty valid JSON before upload
        if [ ! -s grype-image.sarif ] || ! python3 -c "import json,sys; json.load(open('grype-image.sarif'))" 2>/dev/null; then
          echo "grype-image.sarif is missing or invalid, removing to skip upload"
          rm -f grype-image.sarif
        fi

    - name: Upload Grype SARIF to code scanning
      if: ${{ hashFiles('grype-image.sarif') != '' }}
      uses: github/codeql-action/upload-sarif@v4
      with:
        sarif_file: grype-image.sarif

