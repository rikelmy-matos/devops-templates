name: StageDockerfileScans
description: "Scan a container image with Trivy, upload SARIF"
inputs:
  registry:
    description: Container registry hostname (e.g. ghcr.io or myregistry.azurecr.io)
    required: false
    default: ''
  username:
    description: Registry username if login required
    required: false
    default: ''
  password:
    description: Registry password/token if login required
    required: false
    default: ''
  image:
    description: Full image name without tag (e.g. myorg/app)
    required: true
  tag:
    description: Image tag
    required: false
    default: 'latest'
runs:
  using: composite
  steps:
    - name: Trivy image scan (SARIF)
      uses: aquasecurity/trivy-action@0.35.0
      continue-on-error: true
      env:
        # Trivy uses these to authenticate directly against the registry
        # via its own HTTP client, bypassing the Docker daemon entirely
        TRIVY_USERNAME: ${{ inputs.username }}
        TRIVY_PASSWORD: ${{ inputs.password }}
      with:
        image-ref: ${{ inputs.registry != '' && format('{0}/', inputs.registry) || '' }}${{ inputs.image }}:${{ inputs.tag }}
        format: 'sarif'
        output: trivy-image.sarif
        vuln-type: 'os,library'
        ignore-unfixed: true

    - name: Upload Trivy SARIF to code scanning
      if: ${{ hashFiles('trivy-image.sarif') != '' }}
      uses: github/codeql-action/upload-sarif@v4
      with:
        sarif_file: trivy-image.sarif
