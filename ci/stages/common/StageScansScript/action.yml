name: StageScansScript
description: "Run repo scans: Trivy FS/Config/Secrets, Semgrep, KICS, Gitleaks, Microsoft Security DevOps"
inputs:
  run-trivy:
    description: Run Trivy filesystem/config/secret scan
    required: false
    default: 'true'
  run-semgrep:
    description: Run Semgrep SAST
    required: false
    default: 'true'
  run-kics:
    description: Run KICS IaC scan
    required: false
    default: 'true'
  run-gitleaks:
    description: Run Gitleaks
    required: false
    default: 'true'
  run-msdo:
    description: Run Microsoft Security DevOps
    required: false
    default: 'true'
  semgrep-config:
    description: Semgrep ruleset (e.g. p/ci)
    required: false
    default: 'p/ci'
runs:
  using: composite
  steps:
    - name: Ensure workspace
      shell: bash
      run: mkdir -p artifacts/sarif

    - name: Trivy FS/Config/Secret
      if: ${{ inputs['run-trivy'] == 'true' }}
      uses: aquasecurity/trivy-action@0.35.0
      continue-on-error: true
      with:
        scan-type: fs
        scanners: vuln,config,secret
        format: sarif
        output: artifacts/sarif/trivy-fs.sarif
        severity: CRITICAL,HIGH,MEDIUM,LOW
        ignore-unfixed: true

    - name: Upload Trivy FS SARIF
      if: ${{ inputs['run-trivy'] == 'true' }}
      uses: github/codeql-action/upload-sarif@v4
      with:
        sarif_file: artifacts/sarif/trivy-fs.sarif

    - name: Setup Python for Semgrep
      if: ${{ inputs['run-semgrep'] == 'true' }}
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Semgrep
      if: ${{ inputs['run-semgrep'] == 'true' }}
      shell: bash
      continue-on-error: true
      run: |
        pip install semgrep --quiet
        semgrep scan --config "${{ inputs['semgrep-config'] }}" \
          --sarif --output artifacts/sarif/semgrep.sarif \
          --no-autofix \
          .

    - name: Upload Semgrep SARIF
      if: ${{ inputs['run-semgrep'] == 'true' }}
      uses: github/codeql-action/upload-sarif@v4
      with:
        sarif_file: artifacts/sarif/semgrep.sarif

    - name: KICS IaC scan
      if: ${{ inputs['run-kics'] == 'true' }}
      uses: Checkmarx/kics-github-action@v2.1.5
      continue-on-error: true
      with:
        path: .
        output_path: artifacts/sarif
        output_formats: 'sarif'
        fail_on: 'high,medium'

    - name: Upload KICS SARIF
      if: ${{ inputs['run-kics'] == 'true' && hashFiles('artifacts/sarif/results.sarif') != '' }}
      uses: github/codeql-action/upload-sarif@v4
      with:
        sarif_file: artifacts/sarif/results.sarif

    - name: Gitleaks
      if: ${{ inputs['run-gitleaks'] == 'true' }}
      shell: bash
      continue-on-error: true
      run: |
        curl -sSfL https://github.com/gitleaks/gitleaks/releases/latest/download/gitleaks_$(curl -s https://api.github.com/repos/gitleaks/gitleaks/releases/latest | grep '"tag_name"' | cut -d'"' -f4 | tr -d v)_linux_x64.tar.gz \
          | tar -xz -C /usr/local/bin gitleaks
        gitleaks detect --source . \
          --report-format sarif \
          --report-path artifacts/sarif/gitleaks.sarif \
          --no-banner \
          --exit-code 0

    - name: Upload Gitleaks SARIF
      if: ${{ inputs['run-gitleaks'] == 'true' && hashFiles('artifacts/sarif/gitleaks.sarif') != '' }}
      uses: github/codeql-action/upload-sarif@v4
      with:
        sarif_file: artifacts/sarif/gitleaks.sarif

    - name: Microsoft Security DevOps
      if: ${{ inputs['run-msdo'] == 'true' }}
      uses: microsoft/security-devops-action@preview

    - name: Upload SARIF artifacts bundle
      uses: actions/upload-artifact@v4
      with:
        name: CodeAnalysisLogs
        path: artifacts/sarif/*.sarif
        if-no-files-found: ignore

