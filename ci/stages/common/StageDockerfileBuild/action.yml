name: StageDockerfileBuild
description: "Build and push Docker image with Buildx"
inputs:
  registry:
    description: Container registry hostname (e.g. ghcr.io or myregistry.azurecr.io)
    required: true
  username:
    description: Registry username (use GitHub actor or service account)
    required: true
  password:
    description: Registry password or token (use secrets)
    required: true
  repository:
    description: Repository/name (e.g. env/site)
    required: true
  dockerfile:
    description: Path to Dockerfile
    required: false
    default: '**/Dockerfile'
  context:
    description: Build context directory
    required: false
    default: '.'
  tags:
    description: Pipe/newline/comma separated tag list (e.g. latest,${{ github.sha }})
    required: false
    default: 'latest'
runs:
  using: composite
  steps:
    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to registry
      uses: docker/login-action@v3
      with:
        registry: ${{ inputs.registry }}
        username: ${{ inputs.username }}
        password: ${{ inputs.password }}

    - name: Build and push
      uses: docker/build-push-action@v5
      with:
        context: ${{ inputs.context }}
        file: ${{ inputs.dockerfile }}
        push: true
        tags: ${{ inputs.registry }}/${{ inputs.repository }}:${{ inputs.tags }}

